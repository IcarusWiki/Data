name: Poll Icarus Update

on:
  #schedule:
  #  - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: icarus-poll
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

env:
  STEAM_APP_ID: "1149460"
  HEAVY_WORKFLOW: "process-icarus-data.yml"
  STEAMCMD_URL: "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install vdf==3.4

      - name: Install SteamCMD
        id: steamcmd
        timeout-minutes: 2
        run: |
          STEAMCMD_DIR="$RUNNER_TEMP/steamcmd"
          mkdir -p "$STEAMCMD_DIR"

          if ! dpkg-query -W -f='${Status}' lib32gcc-s1 2>/dev/null | grep -q "ok installed"; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq lib32gcc-s1
          fi

          if [ ! -x "$STEAMCMD_DIR/steamcmd.sh" ]; then
            curl -fsSL "$STEAMCMD_URL" | tar -xzf - -C "$STEAMCMD_DIR"
            chmod +x "$STEAMCMD_DIR/steamcmd.sh"
          fi

          echo "steamcmd_path=$STEAMCMD_DIR/steamcmd.sh" >> "$GITHUB_OUTPUT"

      - name: Get current build ID
        id: steam
        timeout-minutes: 2
        run: |
          STEAMCMD_PATH="${{ steps.steamcmd.outputs.steamcmd_path }}"

          # SteamCMD often needs two passes to populate the info cache
          "$STEAMCMD_PATH" +login anonymous \
            +app_info_update 1 \
            +app_info_print "$STEAM_APP_ID" \
            +quit > /dev/null 2>&1 || true

          "$STEAMCMD_PATH" +login anonymous \
            +app_info_update 1 \
            +app_info_print "$STEAM_APP_ID" \
            +quit > app_info.txt 2>&1

          if [ ! -s app_info.txt ]; then
            echo "::error::SteamCMD did not produce app_info.txt"
            exit 1
          fi

          BUILD_ID="$(
            python scripts/parse_steam_build_id.py \
              --app-id "$STEAM_APP_ID" \
              app_info.txt
          )"

          if [ -z "$BUILD_ID" ]; then
            echo "::error::Failed to parse build ID from SteamCMD output"
            cat app_info.txt
            exit 1
          fi

          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "Current build ID: $BUILD_ID"

      - name: Compare with stored build ID
        id: compare
        env:
          CURRENT: ${{ steps.steam.outputs.build_id }}
          STORED: ${{ vars.ICARUS_BUILD_ID }}
        run: |
          if [ "$CURRENT" = "$STORED" ]; then
            echo "Build ID unchanged ($CURRENT)"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Build ID changed: ${STORED:-<unset>} -> $CURRENT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch heavy workflow
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          # We use repository_dispatch instead of the Actions workflows API here
          # because some repo/token combinations return 404 for workflow lookup
          # even when repo dispatching is allowed.
          gh api \
            "/repos/${{ github.repository }}/dispatches" \
            -X POST \
            -f event_type="icarus-poll-dispatch" \
            -f "client_payload[build_id]=${{ steps.steam.outputs.build_id }}" \
            -f "client_payload[source_workflow]=poll-icarus-update.yml"
          echo "Dispatched $HEAVY_WORKFLOW via repository_dispatch"
          echo "This dispatch intentionally marks the build as handled by automation."
          echo "If the heavy workflow later fails or is cancelled, automation will not retry it."
          echo "Use manual workflow_dispatch to rerun that same build."

      - name: Update stored build ID
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          # Store the build ID immediately after a successful dispatch so failed heavy
          # runs do not get auto-retried on the next poll. Manual reruns stay available.
          gh variable set ICARUS_BUILD_ID \
            --body "${{ steps.steam.outputs.build_id }}"
          echo "Stored build ID updated to ${{ steps.steam.outputs.build_id }}"
