name: Check Icarus Update

on:
  schedule:
    - cron: '0 0 * * 6' # Saturday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  DD_VERSION: "3.4.0"
  STEAMGUARD_VERSION: "0.17.1"

jobs:
  download-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install DepotDownloader
        run: |
          curl -sSL "https://github.com/SteamRE/DepotDownloader/releases/download/DepotDownloader_${DD_VERSION}/DepotDownloader-linux-x64.zip" \
            -o depotdownloader.zip
          mkdir -p "$HOME/.local/bin/depotdownloader"
          unzip depotdownloader.zip -d "$HOME/.local/bin/depotdownloader"
          chmod +x "$HOME/.local/bin/depotdownloader/DepotDownloader"
          echo "$HOME/.local/bin/depotdownloader" >> "$GITHUB_PATH"
          rm -f depotdownloader.zip

      - name: Install steamguard-cli
        run: |
          curl -sSL "https://github.com/dyc3/steamguard-cli/releases/download/v${STEAMGUARD_VERSION}/steamguard" \
            -o /usr/local/bin/steamguard
          chmod +x /usr/local/bin/steamguard

      - name: Setup steamguard maFiles
        env:
          STEAM_MAFILE_JSON: ${{ secrets.STEAM_MAFILE }}
          STEAM_MAFILE_ACCOUNT_JSON: ${{ secrets.STEAM_MAFILE_ACCOUNT }}
        run: |
          MAFILES_DIR="$HOME/.config/steamguard-cli/maFiles"
          mkdir -p "$MAFILES_DIR"
          chmod 700 "$HOME/.config/steamguard-cli" "$MAFILES_DIR"

          printf '%s' "$STEAM_MAFILE_JSON" > "$MAFILES_DIR/manifest.json"

          ACCOUNT_FILE="$(jq -r '.entries[0].filename' "$MAFILES_DIR/manifest.json")"
          ACCOUNT_FILE="$(basename "$ACCOUNT_FILE")"

          printf '%s' "$STEAM_MAFILE_ACCOUNT_JSON" > "$MAFILES_DIR/$ACCOUNT_FILE"
          chmod 600 "$MAFILES_DIR/manifest.json" "$MAFILES_DIR/$ACCOUNT_FILE"

      - name: Restore DepotDownloader auth cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/depotdownloader/account.config
          key: depotdownloader-auth-${{ secrets.STEAM_USER }}-${{ github.run_id }}
          restore-keys: |
            depotdownloader-auth-${{ secrets.STEAM_USER }}-

      - name: Clean previous partial download
        run: |
          rm -rf ./game_files
          rm -f ./filelist.txt

      - name: Download data.pak
        timeout-minutes: 20
        run: |
          echo 'regex:^Icarus/Content/Data/data\.pak$' > filelist.txt

          mkdir -p "${{ runner.temp }}/depotdownloader"

          (
            while true; do
              steamguard approve --dangerously-approve-all >/dev/null 2>&1 || true
              sleep 5
            done
          ) &
          APPROVER_PID=$!
          trap 'kill "$APPROVER_PID" 2>/dev/null || true' EXIT

          CODE="$(steamguard code)"

          cd "${{ runner.temp }}/depotdownloader"

          printf '%s\n' "$CODE" | DepotDownloader \
            -app 1149460 \
            -depot 1149461 \
            -username "${{ secrets.STEAM_USER }}" \
            -password "${{ secrets.STEAM_PASS }}" \
            -remember-password \
            -no-mobile \
            -filelist "$GITHUB_WORKSPACE/filelist.txt" \
            -dir "$GITHUB_WORKSPACE/game_files" \
            -validate \
            -debug

      - name: Verify download
        run: |
          DATA_PAK="./game_files/Icarus/Content/Data/data.pak"
          if [ ! -f "$DATA_PAK" ]; then
            echo "::error::data.pak not found in download"
            find ./game_files -maxdepth 6 -type f | sort || true
            exit 1
          fi
          echo "DATA_PAK_PATH=$DATA_PAK" >> "$GITHUB_ENV"
          ls -lh "$DATA_PAK"

      - name: Commit data.pak if changed
        id: commit
        run: |
          cp "$DATA_PAK_PATH" ./data.pak

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet -- data.pak 2>/dev/null; then
            echo "data.pak unchanged, skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add data.pak
            git commit -m "Update data.pak ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch to consumer repos
        if: steps.commit.outputs.changed == 'true'
        run: |
          REPOS=(
            # Add your consumer repos here, one per line:
            # "repo-a"
            # "repo-b"
          )

          OWNER="${{ github.repository_owner }}"
          SHA=$(git rev-parse HEAD)

          for REPO in "${REPOS[@]}"; do
            echo "Dispatching to $OWNER/$REPO"
            gh api "/repos/$OWNER/$REPO/dispatches" \
              -f event_type="icarus-updated" \
              -f "client_payload[sha]=$SHA" || echo "::warning::Failed to dispatch to $REPO"
          done
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf ./game_files
          rm -f ./filelist.txt
          rm -rf "$HOME/.config/steamguard-cli"
