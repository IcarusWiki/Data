name: Process Icarus Data

on:
  repository_dispatch:
    types:
      - icarus-poll-dispatch
  workflow_dispatch:
    inputs:
      force_consumer_dispatch:
        description: "Redispatch consumer repos even when InGameFiles is unchanged"
        required: false
        type: boolean
        default: false

concurrency:
  group: icarus-data-update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DD_VERSION: "3.4.0"
  STEAMGUARD_VERSION: "0.17.1"
  STEAM_APP_ID: "1149460"
  STEAM_DEPOT_ID: "1149461"

jobs:
  download-and-publish:
    runs-on: windows-latest   # Windows for Oodle DLL compatibility with pyuepak
    timeout-minutes: 9        # Hard cap for the entire job
    outputs:
      ingamefiles_changed: ${{ steps.dispatch_state.outputs.ingamefiles_changed }}
      published_sha: ${{ steps.dispatch_state.outputs.published_sha }}
      dispatch_requested: ${{ steps.dispatch_state.outputs.dispatch_requested }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout current repo
        timeout-minutes: 1
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        timeout-minutes: 1
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        timeout-minutes: 1
        run: |
          python -m pip install --upgrade pip
          pip install \
            pyuepak==0.2.6.2 \
            cryptography==46.0.6

      - name: Setup Steam tools
        id: steamtools
        timeout-minutes: 2
        uses: ./.github/actions/setup-steam
        with:
          dd-version: ${{ env.DD_VERSION }}
          steamguard-version: ${{ env.STEAMGUARD_VERSION }}
          steam-mafile-json: ${{ secrets.STEAM_MAFILE }}
          steam-mafile-account-json: ${{ secrets.STEAM_MAFILE_ACCOUNT }}

      - name: Clean previous partial download and extraction
        run: |
          WORKSPACE_UNIX="$(cygpath -u "$GITHUB_WORKSPACE")"
          RUNNER_TEMP_UNIX="$(cygpath -u "$RUNNER_TEMP")"

          rm -rf "$WORKSPACE_UNIX/game_files"
          rm -f "$WORKSPACE_UNIX/filelist.txt"
          rm -rf "$RUNNER_TEMP_UNIX/depotdownloader"
          rm -rf "$RUNNER_TEMP_UNIX/InGameFiles.new"

      - name: Download data.pak
        timeout-minutes: 2
        env:
          STEAM_USER: ${{ secrets.STEAM_USER }}
          STEAM_PASS: ${{ secrets.STEAM_PASS }}
        run: |
          WORKSPACE_UNIX="$(cygpath -u "$GITHUB_WORKSPACE")"
          RUNNER_TEMP_UNIX="$(cygpath -u "$RUNNER_TEMP")"
          TOOL_DIR="${{ steps.steamtools.outputs.tool_dir }}"

          echo 'regex:^Icarus/Content/Data/data\.pak$' > "$WORKSPACE_UNIX/filelist.txt"
          mkdir -p "$RUNNER_TEMP_UNIX/depotdownloader"

          attempts=0
          max_attempts=12

          (
            while [ "$attempts" -lt "$max_attempts" ]; do
              if ! "$TOOL_DIR/steamguard.exe" approve --dangerously-approve-all >/dev/null 2>&1; then
                echo "::warning::steamguard approve failed on attempt $((attempts + 1))"
              fi
              attempts=$((attempts + 1))
              sleep 5
            done
          ) &
          APPROVER_PID=$!
          trap 'kill "$APPROVER_PID" 2>/dev/null || true' EXIT

          CODE="$("$TOOL_DIR/steamguard.exe" code)"

          cd "$RUNNER_TEMP_UNIX/depotdownloader"

          printf '%s\n%s\n' "$STEAM_PASS" "$CODE" | "$TOOL_DIR/DepotDownloader.exe" \
            -app "$STEAM_APP_ID" \
            -depot "$STEAM_DEPOT_ID" \
            -username "$STEAM_USER" \
            -remember-password \
            -no-mobile \
            -filelist "$WORKSPACE_UNIX/filelist.txt" \
            -dir "$WORKSPACE_UNIX/game_files" \
            -validate

      - name: Verify download
        run: |
          DATA_PAK="./game_files/Icarus/Content/Data/data.pak"
          if [ ! -f "$DATA_PAK" ]; then
            echo "::error::data.pak not found in download"
            find ./game_files -maxdepth 6 -type f | sort || true
            exit 1
          fi

          echo "DATA_PAK_PATH=$DATA_PAK" >> "$GITHUB_ENV"
          ls -lh "$DATA_PAK"

      - name: Extract data.pak to temp directory
        timeout-minutes: 3
        run: |
          RUNNER_TEMP_UNIX="$(cygpath -u "$RUNNER_TEMP")"
          rm -rf "$RUNNER_TEMP_UNIX/InGameFiles.new"

          python scripts/extract_pak.py \
            --pak "$DATA_PAK_PATH" \
            --out "$RUNNER_TEMP_UNIX/InGameFiles.new"

      - name: Verify extraction
        run: |
          RUNNER_TEMP_UNIX="$(cygpath -u "$RUNNER_TEMP")"
          FILE_COUNT=$(find "$RUNNER_TEMP_UNIX/InGameFiles.new" -type f | wc -l)
          echo "Extracted $FILE_COUNT files"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::Extraction produced no files"
            exit 1
          fi

      - name: Replace InGameFiles
        run: |
          WORKSPACE_UNIX="$(cygpath -u "$GITHUB_WORKSPACE")"
          RUNNER_TEMP_UNIX="$(cygpath -u "$RUNNER_TEMP")"

          rm -rf "$WORKSPACE_UNIX/InGameFiles"
          mv "$RUNNER_TEMP_UNIX/InGameFiles.new" "$WORKSPACE_UNIX/InGameFiles"

      - name: Commit InGameFiles if changed
        timeout-minutes: 2
        id: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A InGameFiles/

          if git diff --cached --quiet -- InGameFiles/; then
            echo "InGameFiles unchanged, skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update InGameFiles ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve publish and dispatch outputs
        id: dispatch_state
        env:
          CHANGED: ${{ steps.commit.outputs.changed }}
          FORCE_CONSUMER_DISPATCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_consumer_dispatch || 'false' }}
        run: |
          DISPATCH_REQUESTED=false
          PUBLISHED_SHA=""

          if [ "$CHANGED" = "true" ]; then
            PUBLISHED_SHA="$(git rev-parse HEAD)"
            DISPATCH_REQUESTED=true
            echo "Published new InGameFiles commit: $PUBLISHED_SHA"
            echo "Dispatching consumer repos for the fresh publish."
          else
            PUBLISHED_SHA="$(git log -1 --format=%H -- InGameFiles/ || true)"

            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$FORCE_CONSUMER_DISPATCH" = "true" ]; then
              if [ -z "$PUBLISHED_SHA" ]; then
                echo "::error::force_consumer_dispatch=true but no prior InGameFiles commit was found."
                exit 1
              fi

              DISPATCH_REQUESTED=true
              echo "Manual replay requested, dispatching the last InGameFiles commit: $PUBLISHED_SHA"
            elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              echo "Manual run did not request force_consumer_dispatch, so consumer dispatch is skipped because InGameFiles is unchanged."
            else
              echo "InGameFiles unchanged, so consumer dispatch is skipped."
            fi
          fi

          echo "ingamefiles_changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "published_sha=$PUBLISHED_SHA" >> "$GITHUB_OUTPUT"
          echo "dispatch_requested=$DISPATCH_REQUESTED" >> "$GITHUB_OUTPUT"

      - name: Cleanup
        if: always()
        run: |
          RUNNER_TEMP_UNIX="$(cygpath -u "$RUNNER_TEMP")"
          APPDATA_UNIX="$(cygpath -u "$APPDATA")"

          rm -rf ./game_files
          rm -f ./filelist.txt
          rm -rf "$RUNNER_TEMP_UNIX/depotdownloader"
          rm -rf "$RUNNER_TEMP_UNIX/InGameFiles.new"
          rm -rf "$APPDATA_UNIX/steamguard-cli" 2>/dev/null || true

  dispatch_consumers:
    needs: download-and-publish
    if: needs.download-and-publish.outputs.dispatch_requested == 'true'
    runs-on: windows-latest
    timeout-minutes: 5

    defaults:
      run:
        shell: bash

    steps:
      - name: Dispatch to consumer repos
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          REPOS=(
            "TreeUI"
          )

          OWNER="${{ github.repository_owner }}"
          SHA="${{ needs.download-and-publish.outputs.published_sha }}"

          if [ -z "$SHA" ]; then
            echo "::error::No published_sha available for consumer dispatch."
            exit 1
          fi

          echo "Dispatching consumer repos for InGameFiles commit $SHA"

          for REPO in "${REPOS[@]}"; do
            echo "Dispatching to $OWNER/$REPO"
            gh api "repos/$OWNER/$REPO/dispatches" \
              -X POST \
              -f event_type="icarus-updated" \
              -f "client_payload[sha]=$SHA"
          done

  discover_content_paks:
    needs: download-and-publish
    runs-on: windows-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}
      discovered_count: ${{ steps.build_matrix.outputs.discovered_count }}
      scheduled_count: ${{ steps.build_matrix.outputs.scheduled_count }}
      finalizer_matrix: ${{ steps.build_matrix.outputs.finalizer_matrix }}
      finalizer_count: ${{ steps.build_matrix.outputs.finalizer_count }}

    steps:
      - name: Checkout current repo
        timeout-minutes: 1
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        timeout-minutes: 1
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        timeout-minutes: 1
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml==6.0.3

      - name: Setup Steam tools
        id: steamtools
        timeout-minutes: 2
        uses: ./.github/actions/setup-steam
        with:
          dd-version: ${{ env.DD_VERSION }}
          steamguard-version: ${{ env.STEAMGUARD_VERSION }}
          steam-mafile-json: ${{ secrets.STEAM_MAFILE }}
          steam-mafile-account-json: ${{ secrets.STEAM_MAFILE_ACCOUNT }}

      - name: Download depot manifest only
        timeout-minutes: 6
        env:
          STEAM_USER: ${{ secrets.STEAM_USER }}
          STEAM_PASS: ${{ secrets.STEAM_PASS }}
        run: |
          RUNNER_TEMP_UNIX="$(cygpath -u "$RUNNER_TEMP")"
          TOOL_DIR="${{ steps.steamtools.outputs.tool_dir }}"
          MANIFEST_DIR="$RUNNER_TEMP_UNIX/depot-manifest"
          DEPOT_WORK_DIR="$MANIFEST_DIR/depotdownloader"

          rm -rf "$MANIFEST_DIR"
          mkdir -p "$DEPOT_WORK_DIR"

          attempts=0
          max_attempts=12

          (
            while [ "$attempts" -lt "$max_attempts" ]; do
              if ! "$TOOL_DIR/steamguard.exe" approve --dangerously-approve-all >/dev/null 2>&1; then
                echo "::warning::steamguard approve failed on attempt $((attempts + 1))"
              fi
              attempts=$((attempts + 1))
              sleep 5
            done
          ) &
          APPROVER_PID=$!
          trap 'kill "$APPROVER_PID" 2>/dev/null || true' EXIT

          CODE="$("$TOOL_DIR/steamguard.exe" code)"
          LOG_FILE="$MANIFEST_DIR/depot-manifest.log"

          cd "$DEPOT_WORK_DIR"

          if ! printf '%s\n%s\n' "$STEAM_PASS" "$CODE" | "$TOOL_DIR/DepotDownloader.exe" \
            -app "$STEAM_APP_ID" \
            -depot "$STEAM_DEPOT_ID" \
            -username "$STEAM_USER" \
            -remember-password \
            -no-mobile \
            -dir "$MANIFEST_DIR" \
            -manifest-only >"$LOG_FILE" 2>&1; then
            cat "$LOG_FILE"
            exit 1
          fi

      - name: Build pak matrix
        id: build_matrix
        run: |
          RUNNER_TEMP_UNIX="$(cygpath -u "$RUNNER_TEMP")"
          python scripts/build_pak_matrix.py \
            --manifest-root "$RUNNER_TEMP_UNIX/depot-manifest" \
            --rules ".github/icarus-pak-processors.yml" \
            --consumers ".github/icarus-consumers.yml" \
            --github-output "$GITHUB_OUTPUT"

      - name: Report matrix summary
        run: |
          echo "Discovered paks: ${{ steps.build_matrix.outputs.discovered_count }}"
          echo "Scheduled pak jobs: ${{ steps.build_matrix.outputs.scheduled_count }}"
          echo "Scheduled finalizer jobs: ${{ steps.build_matrix.outputs.finalizer_count }}"

      - name: Cleanup
        if: always()
        run: |
          RUNNER_TEMP_UNIX="$(cygpath -u "$RUNNER_TEMP")"
          APPDATA_UNIX="$(cygpath -u "$APPDATA")"

          rm -rf "$RUNNER_TEMP_UNIX/depot-manifest"
          rm -rf "$RUNNER_TEMP_UNIX/steam-tools"
          rm -rf "$APPDATA_UNIX/steamguard-cli" 2>/dev/null || true

  process_content_paks:
    needs: discover_content_paks
    if: needs.discover_content_paks.outputs.scheduled_count != '0'
    runs-on: windows-latest
    timeout-minutes: 150

    strategy:
      fail-fast: true
      max-parallel: 1
      matrix: ${{ fromJSON(needs.discover_content_paks.outputs.matrix) }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout current repo
        timeout-minutes: 1
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        timeout-minutes: 1
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        timeout-minutes: 2
        run: |
          python -m pip install --upgrade pip
          pip install \
            pyuepak==0.2.6.2 \
            cryptography==46.0.6 \
            pyyaml==6.0.3

      - name: Set up .NET (for Ue4Export)
        timeout-minutes: 5
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Download Ue4Export
        timeout-minutes: 4
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
          }
          if ($env:GITHUB_TOKEN) {
            $headers.Authorization = "Bearer $env:GITHUB_TOKEN"
          }

          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/CrystalFerrai/Ue4Export/releases/latest" `
            -Headers $headers

          $asset = $release.assets | Where-Object { $_.name -like "*.zip" } | Select-Object -First 1
          if (-not $asset) { throw "No zip asset found in latest Ue4Export release." }

          $zip = "$env:RUNNER_TEMP\ue4export.zip"
          $out = "$env:RUNNER_TEMP\ue4export"

          Invoke-WebRequest -Uri $asset.browser_download_url -Headers $headers -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $out -Force

          $exe = Get-ChildItem $out -Recurse -Filter Ue4Export.exe | Select-Object -First 1
          if (-not $exe) { throw "Ue4Export.exe not found after extraction." }

          "UE4EXPORT_EXE=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Ue4Export installed at $($exe.FullName)"

      - name: Setup Steam tools
        id: steamtools
        timeout-minutes: 2
        uses: ./.github/actions/setup-steam
        with:
          dd-version: ${{ env.DD_VERSION }}
          steamguard-version: ${{ env.STEAMGUARD_VERSION }}
          steam-mafile-json: ${{ secrets.STEAM_MAFILE }}
          steam-mafile-account-json: ${{ secrets.STEAM_MAFILE_ACCOUNT }}

      - name: Process current pak
        timeout-minutes: ${{ matrix.pak_timeout_minutes }}
        uses: ./.github/actions/process-pak
        env:
          STEAM_USER: ${{ secrets.STEAM_USER }}
          STEAM_PASS: ${{ secrets.STEAM_PASS }}
        with:
          pak-path: ${{ matrix.pak_path }}
          pak-name: ${{ matrix.pak_name }}
          pak-slug: ${{ matrix.pak_slug }}
          processors-json: ${{ matrix.processors_json }}
          pak-timeout-minutes: ${{ matrix.pak_timeout_minutes }}
          tool-dir: ${{ steps.steamtools.outputs.tool_dir }}

      - name: Upload consumer artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: consumer-artifacts-${{ matrix.pak_slug }}
          path: ${{ runner.temp }}/consumer-artifacts/
          if-no-files-found: ignore
          retention-days: 1

      - name: Cleanup
        if: always()
        run: |
          RUNNER_TEMP_UNIX="$(cygpath -u "$RUNNER_TEMP")"
          APPDATA_UNIX="$(cygpath -u "$APPDATA")"

          rm -rf "$RUNNER_TEMP_UNIX/steam-tools"
          rm -rf "$RUNNER_TEMP_UNIX/pak-work"
          rm -rf "$RUNNER_TEMP_UNIX/consumer-artifacts"
          rm -rf "$RUNNER_TEMP_UNIX/ue4export" "$RUNNER_TEMP_UNIX/ue4export.zip"
          rm -rf "$APPDATA_UNIX/steamguard-cli" 2>/dev/null || true

  finalize_consumers:
    needs:
      - discover_content_paks
      - process_content_paks
    if: needs.discover_content_paks.outputs.scheduled_count != '0' && needs.discover_content_paks.outputs.finalizer_count != '0' && needs.process_content_paks.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.discover_content_paks.outputs.finalizer_matrix) }}

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: Data

      - name: Checkout consumer repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.consumer_repo }}
          ref: ${{ matrix.consumer_ref }}
          token: ${{ secrets.ORG_PAT }}
          fetch-depth: 1
          path: ${{ matrix.consumer_checkout_path }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download consumer artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: consumer-artifacts-*
          merge-multiple: true
          path: consumer-artifacts/

      - name: Prepare finalizer artifacts
        id: prepare_artifacts
        env:
          ARTIFACT_IDS_JSON: ${{ matrix.finalizer_artifact_ids_json }}
        run: |
          python Data/scripts/prepare_consumer_finalizer_artifacts.py \
            --download-root consumer-artifacts/ \
            --consumer-id "${{ matrix.consumer_id }}" \
            --artifact-ids-json "$ARTIFACT_IDS_JSON" \
            --out-root finalizer-artifacts/ \
            --github-output "$GITHUB_OUTPUT"

      - name: Run consumer finalizer
        if: steps.prepare_artifacts.outputs.has_artifacts == 'true'
        env:
          ICARUS_FINALIZER_ARTIFACT_DIR: ${{ steps.prepare_artifacts.outputs.artifact_dir }}
          ICARUS_DATA_REPO_DIR: ${{ github.workspace }}/Data
          ICARUS_CONSUMER_REPO_DIR: ${{ format('{0}/{1}', github.workspace, matrix.consumer_checkout_path) }}
        run: |
          CONSUMER_WORKDIR="$GITHUB_WORKSPACE/${{ matrix.consumer_checkout_path }}/${{ matrix.finalizer_workdir }}"
          cd "$CONSUMER_WORKDIR"
          ${{ matrix.finalizer_command }}

      - name: Commit consumer changes if changed
        if: steps.prepare_artifacts.outputs.has_artifacts == 'true'
        env:
          COMMIT_PATHS_JSON: ${{ matrix.finalizer_commit_paths_json }}
          CONSUMER_REPO_DIR: ${{ format('{0}/{1}', github.workspace, matrix.consumer_checkout_path) }}
        run: |
          git -C "$CONSUMER_REPO_DIR" config user.name "github-actions"
          git -C "$CONSUMER_REPO_DIR" config user.email "actions@github.com"

          python Data/scripts/stage_consumer_commit_paths.py \
            --repo-dir "$CONSUMER_REPO_DIR" \
            --paths-json "$COMMIT_PATHS_JSON"

          if git -C "$CONSUMER_REPO_DIR" diff --cached --quiet --; then
            echo "${{ matrix.finalizer_id }} unchanged, skipping commit"
          else
            git -C "$CONSUMER_REPO_DIR" commit -m "${{ matrix.finalizer_commit_message }} ($(date -u +%Y-%m-%d))"
            git -C "$CONSUMER_REPO_DIR" push
          fi
