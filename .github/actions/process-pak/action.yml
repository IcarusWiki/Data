name: Process Pak
description: Download, unpack, run processors against one pak, then clean up

inputs:
  pak-path:
    description: Depot-relative pak path to download
    required: true
  pak-name:
    description: Friendly pak name for logs and environment variables
    required: true
  pak-slug:
    description: Filesystem-safe slug for temporary directories
    required: true
  processors-json:
    description: JSON array of resolved processors for this pak
    required: true
  pak-timeout-minutes:
    description: Overall timeout budget for this pak
    required: true
  tool-dir:
    description: Directory containing DepotDownloader.exe and steamguard.exe
    required: true

runs:
  using: composite
  steps:
    - name: Prepare work root
      id: prep
      shell: bash
      env:
        PAK_SLUG: ${{ inputs.pak-slug }}
        RUNNER_TEMP_DIR: ${{ runner.temp }}
      run: |
        to_unix_path() {
          if command -v cygpath >/dev/null 2>&1; then
            cygpath -u "$1"
          else
            printf '%s\n' "$1"
          fi
        }

        if ! printf '%s' "$PAK_SLUG" | grep -Eq '^[a-z0-9][a-z0-9._-]{0,79}$'; then
          echo "::error::Invalid pak slug: $PAK_SLUG"
          exit 1
        fi

        BASE_ROOT="$(to_unix_path "$RUNNER_TEMP_DIR")/pak-work"
        WORK_ROOT="$BASE_ROOT/$PAK_SLUG"
        mkdir -p "$WORK_ROOT"
        echo "base_root=$BASE_ROOT" >> "$GITHUB_OUTPUT"
        echo "work_root=$WORK_ROOT" >> "$GITHUB_OUTPUT"

    - name: Download, extract, and process pak
      shell: bash
      env:
        PAK_PATH: ${{ inputs.pak-path }}
        PAK_NAME: ${{ inputs.pak-name }}
        PAK_SLUG: ${{ inputs.pak-slug }}
        PROCESSORS_JSON: ${{ inputs.processors-json }}
        PAK_TIMEOUT_MINUTES: ${{ inputs.pak-timeout-minutes }}
        TOOL_DIR: ${{ inputs.tool-dir }}
        WORK_ROOT: ${{ steps.prep.outputs.work_root }}
      run: |
        python "$GITHUB_WORKSPACE/scripts/process_single_pak.py" \
          --pak-path "$PAK_PATH" \
          --pak-name "$PAK_NAME" \
          --pak-slug "$PAK_SLUG" \
          --processors-json "$PROCESSORS_JSON" \
          --pak-timeout-minutes "$PAK_TIMEOUT_MINUTES" \
          --tool-dir "$TOOL_DIR" \
          --work-root "$WORK_ROOT" \
          --steam-app-id "$STEAM_APP_ID" \
          --steam-depot-id "$STEAM_DEPOT_ID"

    - name: Cleanup pak work root
      if: always()
      shell: bash
      env:
        BASE_ROOT: ${{ steps.prep.outputs.base_root }}
        WORK_ROOT: ${{ steps.prep.outputs.work_root }}
      run: |
        if [ -z "$WORK_ROOT" ] || [ -z "$BASE_ROOT" ]; then
          exit 0
        fi

        case "$WORK_ROOT" in
          "$BASE_ROOT"/*)
            rm -rf "$WORK_ROOT"
            ;;
          *)
            echo "::warning::Skipping cleanup for unexpected work root: $WORK_ROOT"
            ;;
        esac
