# Rules for processing dynamically discovered files under Icarus/Content/Paks/.
#
# run_on_all:
#   Processors that should run for every discovered pak.
#
# targeted:
#   Additional processors that only run when include_globs match the
#   depot-relative pak path. exclude_globs can be used to suppress a rule.
#
# Example:
# run_on_all:
#   - id: example-global
#     repo: owner/repo
#     ref: main
#     workdir: .
#     command: ./scripts/process-all.sh
#     consumer_id: consumer-name
#     artifact_id: extracted-partials
#     timeout_minutes: 20
#
# targeted:
#   - id: example-subset
#     include_globs:
#       - Icarus/Content/Paks/pakchunk0_s2*-WindowsNoEditor.pak
#     processors:
#       - id: example-targeted
#         repo: owner/repo
#         ref: main
#         workdir: .
#         command: ./scripts/process-subset.sh
#         consumer_id: consumer-name
#         artifact_id: extracted-partials
#         timeout_minutes: 15

version: 1

defaults:
  pak_timeout_minutes: 90
  processor_timeout_minutes: 20
  git_clone_depth: 1

run_on_all: []

targeted:
  - id: plant-maps
    include_globs:
      - Icarus/Content/Paks/pakchunk0_s21-WindowsNoEditor.pak
      - Icarus/Content/Paks/pakchunk0_s22-WindowsNoEditor.pak
      - Icarus/Content/Paks/pakchunk0_s23-WindowsNoEditor.pak
      - Icarus/Content/Paks/pakchunk0_s24-WindowsNoEditor.pak
      - Icarus/Content/Paks/pakchunk0_s25-WindowsNoEditor.pak
      - Icarus/Content/Paks/pakchunk0_s26-WindowsNoEditor.pak
      - Icarus/Content/Paks/pakchunk0_s27-WindowsNoEditor.pak
      - Icarus/Content/Paks/pakchunk0_s28-WindowsNoEditor.pak
      - Icarus/Content/Paks/pakchunk0_s29-WindowsNoEditor.pak
      - Icarus/Content/Paks/pakchunk0_s30-WindowsNoEditor.pak
      - Icarus/Content/Paks/pakchunk0_s31-WindowsNoEditor.pak
    processors:
      - id: plant-map-extract
        repo: IcarusWiki/DataMaps
        ref: main
        workdir: consumerScripts
        command: python extract_plant_map_partials.py --data-root "$GITHUB_WORKSPACE"
        consumer_id: datamaps
        artifact_id: plant-map-partials
        timeout_minutes: 30
